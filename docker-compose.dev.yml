# ESSEN Credentialing Platform — Development Docker Compose
#
# Uses shared infrastructure from localai_default network:
#   - PostgreSQL: localai-postgres-1 (port 5432 internal / 5433 on host)
#   - Redis:      redis container    (port 6379 internal / 6379 on host)
#
# Ports:
#   - 6015 → Next.js web app  (UI + tRPC API + Socket.io)
#   - 6025 → BullMQ worker    (Playwright bots + Bull Board dashboard)

services:
  # -------------------------------------------------------------------------
  # Web Container — Next.js App Router (UI + tRPC + Auth.js + Socket.io)
  # -------------------------------------------------------------------------
  ecred-web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: ecred-web
    env_file: .env.local
    environment:
      NODE_ENV: development
      PORT: 6015
      HOSTNAME: "0.0.0.0"
      # Database — shared localai-postgres-1 container
      DATABASE_URL: postgresql://postgres:testpostgrespass00@localai-postgres-1:5432/e_credentialing_db
      # Redis — shared redis container (on localai_default network)
      REDIS_HOST: redis
      REDIS_PORT: 6379
      # App URLs
      NEXT_PUBLIC_APP_URL: http://localhost:6015
      NEXT_PUBLIC_WORKER_URL: http://localhost:6025
      WORKER_INTERNAL_URL: http://ecred-worker:6025
      # Socket.io
      SOCKET_IO_PATH: /socket.io
      # Development flags
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
      NEXT_TELEMETRY_DISABLED: "1"
    ports:
      - "6015:6015"
    volumes:
      # Hot reload: mount source directories only, exclude node_modules and .next
      - ./src:/app/src
      - ./prisma:/app/prisma
      - ./public:/app/public
      - ./scripts:/app/scripts
      - ./package.json:/app/package.json
      # Mount the route inventory so the dev warmer (scripts/dev/warm-routes.mjs)
      # can pre-compile every static route, not just its hard-coded fallback list.
      - ./docs/qa/inventories:/app/docs/qa/inventories
      - ./next.config.mjs:/app/next.config.mjs
      - ./tailwind.config.ts:/app/tailwind.config.ts
      - ./tsconfig.json:/app/tsconfig.json
      - ./postcss.config.mjs:/app/postcss.config.mjs
      # Pin node_modules and .next to NAMED volumes so a `docker compose rm -fv`
      # or host bind doesn't strand package.json ahead of node_modules. This
      # was the root cause of two production-class incidents (DEF-001 missing
      # pino, and the prior @prisma/client outage). Named volumes survive
      # container recreation and are explicitly removed only by name.
      - ecred_web_node_modules:/app/node_modules
      - ecred_web_next_cache:/app/.next
    networks:
      - ecred-network
      - localai_default
    depends_on:
      - ecred-worker
    restart: unless-stopped
    stdin_open: true
    tty: true
    # `dev:warm` runs `next dev` and pre-compiles every static route once
    # the server is healthy, so the user never pays the per-route compile
    # cost interactively. This `command:` line overrides the image CMD so a
    # `docker compose up -d` picks up the change without an image rebuild.
    command: ["npm", "run", "dev:warm"]

  # -------------------------------------------------------------------------
  # Worker Container — BullMQ + Playwright PSV Bots + Bull Board (port 6025)
  # -------------------------------------------------------------------------
  ecred-worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: ecred-worker
    env_file: .env.local
    environment:
      NODE_ENV: development
      BULL_BOARD_PORT: 6025
      # Database — shared localai-postgres-1 container
      DATABASE_URL: postgresql://postgres:testpostgrespass00@localai-postgres-1:5432/e_credentialing_db
      # Redis — shared redis container
      REDIS_HOST: redis
      REDIS_PORT: 6379
      # Playwright
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "0"
      # Development flags
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "6025:6025"
    volumes:
      - ./src/workers:/app/src/workers
      - ./src/lib:/app/src/lib
      - ./src/server:/app/src/server
      - ./prisma:/app/prisma
      - ./logs:/app/logs
      - ecred_worker_node_modules:/app/node_modules
    networks:
      - ecred-network
      - localai_default
    restart: unless-stopped
    stdin_open: true
    tty: true

volumes:
  # Named volumes for node_modules — see comment in ecred-web service for why.
  ecred_web_node_modules:
  ecred_web_next_cache:
  ecred_worker_node_modules:

networks:
  ecred-network:
    driver: bridge
  localai_default:
    external: true
